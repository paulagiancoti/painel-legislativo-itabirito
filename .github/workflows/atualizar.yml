name: Atualizar dados SAPL

on:
  schedule:
    # Roda à 1h UTC = 22h Brasília (véspera) — mesmo com atraso de horas, fica de madrugada
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar horário (protege horário comercial — apenas execução automática)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "✓ Execução manual — proteção de horário ignorada."
            exit 0
          fi
          HORA_BRASILIA=$(TZ="America/Sao_Paulo" date +%H)
          echo "Hora em Brasília: $HORA_BRASILIA"
          if [ "$HORA_BRASILIA" -ge 8 ] && [ "$HORA_BRASILIA" -le 23 ]; then
            echo "⛔ Horário comercial detectado ($HORA_BRASILIA h). Cancelando para não impactar o site."
            exit 1
          fi
          echo "✓ Horário seguro ($HORA_BRASILIA h). Prosseguindo."

      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar atualização
        run: python atualizar_dados.py

      - name: Verificar se dados foram coletados
        run: |
          python3 - << 'EOF'
          import json, sys, os
          arquivos = ['dados/materias.json', 'dados/normas.json', 'dados/assuntos.json']
          ok = True
          for arq in arquivos:
              if not os.path.exists(arq):
                  print(f'ERRO: {arq} nao encontrado')
                  ok = False
                  continue
              dados = json.load(open(arq))
              print(f'{arq}: {len(dados)} registros')
              if len(dados) == 0:
                  print(f'ERRO: {arq} esta vazio - commit cancelado')
                  ok = False
          sys.exit(0 if ok else 1)
          EOF

      - name: Commitar mudanças (somente se dados válidos)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/
          git diff --staged --quiet || git commit -m "Atualizacao automatica dos dados SAPL"
          git push
