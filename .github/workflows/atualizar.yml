name: Atualizar dados SAPL

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 03:00 em Brasília (horário fixo, sem DST)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub também

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar atualização
        run: python atualizar_dados.py

      - name: Commitar mudanças (se houver)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/
          git diff --staged --quiet || git commit -m "Atualização automática dos dados SAPL"
          git push
