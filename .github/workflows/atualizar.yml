name: Atualizar dados SAPL
on:
  schedule:
    # Dois horários diários — dobra a chance de pegar o SAPL disponível
    - cron: '0 1 * * *'    # 22h Brasília (atual)
    - cron: '0 14 * * *'   # 11h Brasília (horário comercial)
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write
jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar atualização
        run: python atualizar_dados.py

      - name: Verificar se dados foram coletados
        run: |
          python3 - << 'PYEOF'
          import json, sys, os
          arquivos = ['dados/materias.json', 'dados/normas.json', 'dados/assuntos.json']
          ok = True
          for arq in arquivos:
              if not os.path.exists(arq):
                  print(f'ERRO: {arq} nao encontrado')
                  ok = False
                  continue
              dados = json.load(open(arq))
              print(f'{arq}: {len(dados)} registros')
              if len(dados) == 0:
                  print(f'ERRO: {arq} esta vazio - commit cancelado')
                  ok = False
          sys.exit(0 if ok else 1)
          PYEOF

      - name: Commitar mudanças (somente se dados válidos)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/
          git diff --staged --quiet || git commit -m "Atualizacao automatica dos dados SAPL"
          git push
