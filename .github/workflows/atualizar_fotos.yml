name: Atualizar fotos dos vereadores

on:
  workflow_dispatch:   # apenas manual — fotos mudam raramente

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  fotos:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Baixar fotos do SAPL
        run: python atualizar_fotos.py

      - name: Commitar fotos atualizadas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/fotos/
          git diff --staged --quiet || git commit -m "Atualização de fotos dos vereadores"
          git push
